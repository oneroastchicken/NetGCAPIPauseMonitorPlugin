<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>GC监控仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
html, body { overflow: hidden; }
:root {
  --primary: #00f5d4;
  --secondary: #7a56ff;
  --bg: #0f172a;
  --panel: #1e293b;
  --card: #334155;
  --muted: #94a3b8;
  --text: #f8fafc;
  --chart-last-line: #a78bfa;
  --chart-last-fill: rgba(167, 139, 250, 0.5);
  --chart-avg-line: #38bdf8;
  --chart-avg-fill: rgba(56, 189, 248, 0.2);
  --chart-max-line: #f87171;
  --chart-max-fill: rgba(248, 113, 113, 0.2);
}
:root[data-theme='light'] {
  --bg: #f9fafb;
  --panel: #ffffff;
  --card: #f1f5f9;
  --muted: #475569;
  --text: #0f172a;
  --chart-last-line: #7c3aed;
  --chart-last-fill: rgba(124, 58, 237, 0.15);
  --chart-avg-line: #0284c7;
  --chart-avg-fill: rgba(2, 132, 199, 0.15);
  --chart-max-line: #dc2626;
  --chart-max-fill: rgba(220, 38, 38, 0.15);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
  background: var(--bg);
  color: var(--text);
  padding: 20px;
}
#startScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; gap: 20px; }
#startScreen h1 { font-size: 2rem; font-weight: bold; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
#bizType { padding: 10px 14px; border-radius: 6px; border: none; font-size: 1rem; width:300px; }
#launchBtn { padding: 12px 28px; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; background: linear-gradient(90deg, #00f5d4, #7a56ff); color: #fff; box-shadow: 0 0 15px rgba(0,245,212,0.5), 0 0 25px rgba(122,86,255,0.5); transition: all 0.3s ease; position: relative; }
.header { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom: 20px; }
.gc-icon { font-size: 30px; color: var(--text); transform: translateY(3px);}
.gc-title { font-size: 2rem; font-weight: 700; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.pod-container { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
.pod-panel { background: var(--panel); padding: 15px; border-radius: 12px; box-shadow: 0 4px 20px rgba(100,116,139,0.15); width: 45%; min-width: 420px; display: flex; flex-direction: column; }
.pod-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 10px; display:flex; justify-content:space-between; align-items:center; color: #c084fc; cursor: pointer; }
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 6px; }
.card { background: var(--card); border-radius: 8px; padding: 6px 8px; display: flex; justify-content: space-between; align-items: center; }
.card-content { display: flex; flex-direction: column; flex: 1; min-width: 0; }
.card h3 { font-size: 0.65rem; color: var(--muted); font-weight: 500; margin: 0 0 2px 0; }
.card .value { font-size: 0.95rem; font-weight: 700; }
.card-icon { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 6px; font-size: 11px; background-color: transparent; }
.card-icon i { color: inherit; }
.chart-wrapper { flex: 0 0 40%; min-height: 200px; position: relative; }
canvas { width: 100% !important; height: 100% !important; background: var(--panel); border-radius: 8px; }
footer { text-align:center; margin-top:20px; color: var(--muted); font-size: 0.85rem; }
.loading { text-align: center; color: var(--muted); font-size: 1rem; margin-top: 20px; }
.error-banner { background: #ef4444; color: white; padding: 6px; text-align: center; border-radius: 6px; margin-bottom: 10px; display: none; }
.theme-btn { position: fixed; top: 20px; right: 20px; background: var(--panel); color: var(--text); border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer; }
@media (max-width: 900px) { .pod-panel { width: 100%; min-width: unset; } .grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<div id="startScreen">
  <h1>🚀 GC监控启动器</h1>
  <input id="bizType" type="text" placeholder="输入hr bpm im imes iems iwms...">
  <button id="launchBtn" onclick="goWithParam()">启动监控 🚀</button>
</div>

<div id="mainContent" style="display:none;">
  <div class="header">
    <i class="fa-solid fa-recycle gc-icon" style="color:#00f5d4;"></i>
    <div class="gc-title">GC监控仪表盘</div>
  </div>
  <button id="themeToggle" class="theme-btn" title="切换主题">🌙</button>
  <div id="errorBanner" class="error-banner"></div>
  <div class="loading" id="loading"><i class="fa fa-spinner fa-spin"></i> 正在加载数据...</div>
  <div class="pod-container" id="pods"></div>
  <footer id="dataSourceFooter">数据来源: </footer>
</div>

<script>
function goWithParam() {
  const val = document.getElementById('bizType').value.trim();
  if (val) {
    window.location.search = val;
  } else {
    alert('请输入有效系统名称');
  }
}

let query = window.location.search.substring(1);
if (query) {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
  initDashboard(query);
}

function initDashboard(query) {
  const CONFIG = {
    API_URL: `http://dev.xxx.com/api/${query}/gc-monitor`,
    POLL_INTERVAL_MS: 1000,
    MAX_POINTS: 20
  };
  document.getElementById('dataSourceFooter').textContent = `数据来源: ${CONFIG.API_URL}`;
  const state = new Map();
  const safeId = (podKey) => 'pod_' + podKey.replace(/[^a-zA-Z0-9_-]/g, '_');
  const parseTime = (t) => t ? new Date(t instanceof Date ? t : t.replace(' ', 'T')) : new Date(0);
  const adjustBgColor = (colorHex) => {
    const theme = document.documentElement.getAttribute('data-theme') || 'dark';
    return theme === 'dark' ? colorHex + "33" : colorHex + "1A";
  };
  const makeCard = (title, value, icon, colorHex, cls) => {
    const bgLight = adjustBgColor(colorHex);
    return `
      <div class="card">
        <div class="card-content">
          <h3>${title}</h3>
          <div class="value ${cls}">${value}</div>
        </div>
        <div class="card-icon" style="background:${bgLight}; color:${colorHex}">
          <i class="fa-solid ${icon}"></i>
        </div>
      </div>
    `;
  };
  const getColor = (varName) => getComputedStyle(document.documentElement).getPropertyValue(varName).trim();

  class PodPanel {
    constructor(podKey, startUpTime) {
      this.podKey = podKey;
      this.startUpTime = startUpTime;
      this.id = safeId(podKey);
      this.chart = null;
      this.series = [];
      this.elements = {};
      this.initDOM();
      this.initChart();
    }
    initDOM() {
      const container = document.getElementById('pods');
      const panel = document.createElement('div');
      panel.className = 'pod-panel';
      panel.id = this.id;
      panel.innerHTML = `
        <div class="pod-title">
          <div>服务实例：<code>${this.podKey}</code></div>
          <div style="display:flex; flex-direction:column; align-items:flex-end;">
           <span style="font-size:0.75rem;color:${getColor('--muted')}">启动时间：${this.startUpTime}</span>
           <div style="font-size:0.75rem;color:${getColor('--muted')}">单位：ms / 次</div>
          </div>
        </div>
        <div class="grid">
          ${makeCard('总暂停 (次)', '-', 'fa-pause', '#3b82f6', 'totalCount')}
          ${makeCard('总耗时 (ms)', '-', 'fa-stopwatch', '#f59e0b', 'totalPause')}
          ${makeCard('上次暂停 (ms)', '-', 'fa-rotate-right', '#10b981', 'lastPause')}
          ${makeCard('最长暂停 (ms)', '-', 'fa-triangle-exclamation', '#ef4444', 'maxPause')}
          ${makeCard('平均暂停 (ms)', '-', 'fa-chart-line', '#a855f7', 'avgPause')}
        </div>
        <div class="chart-wrapper">
          <canvas id="${this.id}-chart"></canvas>
        </div>
      `;
      container.appendChild(panel);
      this.elements.totalCount = panel.querySelector('.totalCount');
      this.elements.totalPause = panel.querySelector('.totalPause');
      this.elements.lastPause = panel.querySelector('.lastPause');
      this.elements.maxPause = panel.querySelector('.maxPause');
      this.elements.avgPause = panel.querySelector('.avgPause');
    }
    initChart() {
      const ctx = document.getElementById(`${this.id}-chart`).getContext('2d');
      const gradLast = ctx.createLinearGradient(0, 0, 0, 150);
      gradLast.addColorStop(0, getColor('--chart-last-fill'));
      gradLast.addColorStop(1, 'rgba(0,0,0,0)');
      const gradAvg = ctx.createLinearGradient(0, 0, 0, 150);
      gradAvg.addColorStop(0, getColor('--chart-avg-fill'));
      gradAvg.addColorStop(1, 'rgba(0,0,0,0)');
      const gradMax = ctx.createLinearGradient(0, 0, 0, 150);
      gradMax.addColorStop(0, getColor('--chart-max-fill'));
      gradMax.addColorStop(1, 'rgba(0,0,0,0)');
      this.chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [
          { label: '上次暂停 (ms)', data: [], borderColor: getColor('--chart-last-line'), backgroundColor: gradLast, tension: 0.35, fill: true, pointRadius: 2 },
          { label: '平均暂停 (ms)', data: [], borderColor: getColor('--chart-avg-line'), backgroundColor: gradAvg, tension: 0.35, fill: true, pointRadius: 2 },
          { label: '最长暂停 (ms)', data: [], borderColor: getColor('--chart-max-line'), backgroundColor: gradMax, tension: 0.35, fill: true, pointRadius: 2 }
        ] },
        options: {
          maintainAspectRatio: false,
          plugins: { legend: { labels: { color: getColor('--text') } }, tooltip: { mode: 'index', intersect: false } },
          scales: { x: { ticks: { color: getColor('--muted') } }, y: { ticks: { color: getColor('--muted') } } }
        }
      });
    }
    updateCards(latest) {
      const safeNum = v => (v == null ? '-' : Math.round(v));
      this.elements.totalCount.textContent = safeNum(latest.totalCount);
      this.elements.totalPause.textContent = safeNum(latest.totalPause);
      this.elements.lastPause.textContent = safeNum(latest.lastPause);
      this.elements.maxPause.textContent = safeNum(latest.maxPause);
      this.elements.avgPause.textContent = safeNum(latest.avgPause);
    }
    updateChart(newSeries) {
      const latest = Array.isArray(newSeries) && newSeries.length
        ? newSeries.reduce((a, b) => parseTime(a.time) > parseTime(b.time) ? a : b)
        : null;
      if (!latest) return;
      if (!this.series.length || parseTime(latest.time) > parseTime(this.series[this.series.length - 1].time)) {
        this.series.push(latest);
        if (this.series.length > CONFIG.MAX_POINTS) this.series.shift();
      }
      const safeNum = v => (v == null ? null : Number(v));
      this.chart.data.labels = this.series.map(d => parseTime(d.time).toLocaleTimeString('zh-CN', { hour12: false }));
      this.chart.data.datasets[0].data = this.series.map(d => safeNum(d.lastPause));
      this.chart.data.datasets[1].data = this.series.map(d => safeNum(d.avgPause));
      this.chart.data.datasets[2].data = this.series.map(d => safeNum(d.maxPause));
      this.chart.update();
    }
  }

  async function fetchAndUpdate() {
    try {
      const r = await fetch(CONFIG.API_URL, { cache: 'no-store' });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('errorBanner').style.display = 'none';
      const grouped = {};
      for (const [podKey, value] of Object.entries(data)) {
        if (Array.isArray(value)) {
          grouped[podKey] = value;
        } else if (value && Array.isArray(value.pauses)) {
          grouped[podKey] = value.pauses;
          grouped[podKey]._startUpTime = value.startUpTime;
        }
      }
      for (const [podKey, arr] of Object.entries(grouped)) {
        if (!Array.isArray(arr) || !arr.length) continue;
        const startUpTime = arr._startUpTime || null;
        if (!state.has(podKey)) state.set(podKey, new PodPanel(podKey, startUpTime));
        const latest = arr.reduce((a, b) => parseTime(a.time) > parseTime(b.time) ? a : b);
        state.get(podKey).updateCards(latest);
        state.get(podKey).updateChart(arr);
      }
    } catch (err) {
      document.getElementById('errorBanner').textContent = '数据加载失败: ' + err.message;
      document.getElementById('errorBanner').style.display = 'block';
    }
  }

  (function initThemeToggle() {
    const btn = document.getElementById('themeToggle');
    btn.addEventListener('click', () => {
      const theme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', theme);
      document.querySelectorAll('canvas').forEach(c => c.chart?.update());
    });
  })();
  fetchAndUpdate();
  setInterval(fetchAndUpdate, CONFIG.POLL_INTERVAL_MS);
}
</script>
</body>
</html>
